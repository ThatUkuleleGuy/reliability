<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reliability Game – Player vs Computer</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #5a6c7d;
            --player: #4a6fa5;
            --player-light: #e8f0fa;
            --player-dark: #345180;
            --computer: #e8835c;
            --computer-light: #fef0eb;
            --computer-dark: #c96a45;
            --coin-gold: #d4a843;
            --coin-gold-light: #fdf3d0;
            --coin-gold-dark: #b8922e;
            --die-red: #c0392b;
            --die-red-light: #fde8e5;
            --die-red-dark: #9b2c20;
            --win: #27ae60;
            --win-bg: #eafaf1;
            --lose: #e74c3c;
            --lose-bg: #fdedec;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 14px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.12), 0 4px 10px rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #e8eef5 0%, #f0f4f8 30%, #f7f2ed 70%, #fdf0eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 620px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header { text-align: center; }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 0.95rem;
            color: #5a6c7d;
            font-weight: 500;
        }

        .scoreboard { display: flex; gap: 16px; align-items: stretch; }
        .player-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 16px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }
        .player-card.player { border-color: #dce8f5; }
        .player-card.computer { border-color: #f5e0d8; }
        .player-card .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .player-card.player .label { color: var(--player); }
        .player-card.computer .label { color: var(--computer); }
        .player-card .points {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            line-height: 1;
        }
        .player-card.player .points { color: var(--player-dark); }
        .player-card.computer .points { color: var(--computer-dark); }
        .player-card.pulse-win { animation: pulseWin 0.6s ease-out; }
        .player-card.pulse-lose { animation: pulseLose 0.6s ease-out; }
        .player-card .point-change {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(0);
            font-size: 1.6rem;
            font-weight: 800;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
            white-space: nowrap;
        }
        .player-card .point-change.show {
            animation: floatUp 1.4s ease-out forwards;
        }
        .player-card .point-change.win { color: var(--win); }
        .player-card .point-change.lose { color: var(--lose); }

        @keyframes pulseWin {
            0%, 100% { box-shadow: var(--shadow); }
            30% { box-shadow: 0 0 0 12px rgba(39, 174, 96, 0.2), var(--shadow-lg); }
        }
        @keyframes pulseLose {
            0%, 100% { box-shadow: var(--shadow); }
            30% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0.2), var(--shadow-lg); }
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            40% { opacity: 1; transform: translate(-50%, -50%) translateY(-30px) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-70px) scale(0.8); }
        }

        .round-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .round-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d5dce5;
            transition: var(--transition);
        }
        .round-dot.completed { background: #7fa9d0; box-shadow: 0 0 0 4px rgba(127,169,208,0.2); }
        .round-dot.active { background: #4a6fa5; box-shadow: 0 0 0 8px rgba(74,111,165,0.18); animation: dotPulse 2s ease-in-out infinite; }
        .round-dot.current-loss { background: #e74c3c; box-shadow: 0 0 0 6px rgba(231,76,60,0.2); }
        .round-dot.current-win { background: #27ae60; box-shadow: 0 0 0 6px rgba(39,174,96,0.2); }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(74,111,165,0.2); }
            50% { box-shadow: 0 0 0 12px rgba(74,111,165,0.08); }
        }
        .round-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5a6c7d;
            margin-left: 4px;
        }

        .game-area {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .game-area h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #2d3748;
            text-align: center;
            margin: 0;
        }
        .game-area .hint {
            font-size: 0.85rem;
            color: #7b8ea0;
            text-align: center;
            margin-top: -8px;
        }

        .choice-buttons { display: flex; gap: 16px; width: 100%; flex-wrap: wrap; }
        .choice-btn {
            flex: 1;
            min-width: 140px;
            padding: 20px 16px;
            border-radius: var(--radius);
            border: 2px solid #e8ecf2;
            background: #fafbfc;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }
        .choice-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .choice-btn:active { transform: translateY(-1px); box-shadow: var(--shadow); transition: 0.1s; }
        .choice-btn.coin {
            border-color: #e8d5a3;
            background: linear-gradient(180deg, #fffef9 0%, #fef8e8 100%);
        }
        .choice-btn.coin:hover {
            border-color: var(--coin-gold);
            background: linear-gradient(180deg, #fffef9 0%, #fef3d0 100%);
        }
        .choice-btn.die {
            border-color: #e8c5c0;
            background: linear-gradient(180deg, #fffafa 0%, #fef5f3 100%);
        }
        .choice-btn.die:hover {
            border-color: var(--die-red);
            background: linear-gradient(180deg, #fffafa 0%, #fde8e5 100%);
        }
        .choice-btn .icon { font-size: 3rem; line-height: 1; transition: var(--transition); }
        .choice-btn:hover .icon { transform: scale(1.15); }
        .choice-btn .name { font-weight: 700; font-size: 1.1rem; color: #2d3748; }
        .choice-btn .stakes { font-size: 0.8rem; color: #5a6c7d; text-align: center; line-height: 1.4; }
        .choice-btn .stakes .win-text { color: var(--win); font-weight: 600; }
        .choice-btn .stakes .lose-text { color: var(--lose); font-weight: 600; }

        .prediction-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .predict-btn {
            width: 68px;
            height: 68px;
            border-radius: var(--radius-sm);
            border: 2px solid #e8ecf2;
            background: #fafbfc;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: var(--transition);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        .predict-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #bcc8d6; }
        .predict-btn:active { transform: scale(0.95); transition: 0.1s; }
        .predict-btn.coin-predict {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-size: 1.3rem;
            border: 3px solid #e8d5a3;
            background: linear-gradient(180deg, #fffef9 0%, #fef8e8 100%);
        }
        .predict-btn.coin-predict:hover {
            border-color: var(--coin-gold);
            background: linear-gradient(180deg, #fffef9 0%, #fef3d0 100%);
        }
        .predict-btn.die-predict {
            border: 2px solid #e8c5c0;
            background: #fffafa;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 8px;
            gap: 2px;
        }
        .predict-btn.die-predict:hover { border-color: var(--die-red); background: #fff5f4; }
        .die-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #c0392b;
            margin: auto;
            transition: var(--transition);
        }
        .die-dot.hidden { opacity: 0; transform: scale(0); }

        .result-display { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
        .result-icon { font-size: 5rem; line-height: 1; animation: resultBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes resultBounce {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-outcome { font-size: 1.3rem; font-weight: 700; text-align: center; }
        .result-outcome.win { color: var(--win); }
        .result-outcome.lose { color: var(--lose); }
        .result-detail { font-size: 0.9rem; color: #5a6c7d; text-align: center; }

        .die-result-face {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            background: #fffafa;
            border: 3px solid #c0392b;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 12px;
            gap: 4px;
            box-shadow: var(--shadow);
            animation: resultBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .die-result-face .die-dot {
            width: 16px;
            height: 16px;
            background: #c0392b;
            border-radius: 50%;
            margin: auto;
            transition: all 0.3s;
        }
        .die-result-face .die-dot.hidden { opacity: 0; transform: scale(0); }

        .coin-result {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fef8e8 0%, #e8c965 40%, #d4a843 60%, #fef8e8 100%);
            border: 4px solid #b8922e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #7a5d1e;
            box-shadow: var(--shadow-lg), inset 0 2px 4px rgba(255,255,255,0.5);
            animation: coinFlipIn 0.8s ease-out;
        }
        @keyframes coinFlipIn {
            0% { transform: rotateY(0) scale(0.4); opacity: 0; }
            40% { transform: rotateY(720deg) scale(1.15); opacity: 1; }
            70% { transform: rotateY(720deg) scale(0.95); }
            100% { transform: rotateY(720deg) scale(1); opacity: 1; }
        }

        .action-btn {
            padding: 12px 32px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            letter-spacing: 0.02em;
            box-shadow: var(--shadow);
        }
        .action-btn.primary { background: #4a6fa5; color: #fff; }
        .action-btn.primary:hover { background: #3d5d8a; box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .action-btn.secondary { background: #fff; color: #4a6fa5; border: 2px solid #4a6fa5; }
        .action-btn.secondary:hover { background: #e8f0fa; }

        .history { display: flex; flex-direction: column; gap: 6px; }
        .history h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #7b8ea0;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            font-size: 0.9rem;
            font-weight: 500;
            color: #2d3748;
            flex-wrap: wrap;
        }
        .history-item .round-badge {
            background: #e8ecf2;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #5a6c7d;
            white-space: nowrap;
        }
        .history-item .outcome-badge {
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .history-item .outcome-badge.win { background: var(--win-bg); color: var(--win); }
        .history-item .outcome-badge.lose { background: var(--lose-bg); color: var(--lose); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .overlay.hidden { display: none; }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 32px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal h2 { font-size: 1.5rem; color: #2d3748; }
        .modal .final-scores { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .modal .final-score-card {
            flex: 1;
            min-width: 100px;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-weight: 700;
        }
        .modal .final-score-card.player-final { background: var(--player-light); color: var(--player-dark); }
        .modal .final-score-card.computer-final { background: var(--computer-light); color: var(--computer-dark); }
        .modal .lesson-box {
            background: #fefdf5;
            border: 2px solid #e8d5a3;
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #4a3f2a;
        }
        .modal .lesson-box strong { color: #b8922e; }
        .modal .ev-comparison { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .modal .ev-card {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .modal .ev-card.coin-ev { background: #fefdf5; border: 2px solid #d4a843; color: #7a5d1e; }
        .modal .ev-card.die-ev { background: #fde8e5; border: 2px solid #c0392b; color: #7a1f1a; }
        .modal .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        @media (max-width: 500px) {
            .header h1 { font-size: 1.5rem; }
            .player-card .points { font-size: 2.4rem; }
            .player-card { padding: 14px 10px; }
            .choice-btn { min-width: 120px; padding: 16px 12px; }
            .choice-btn .icon { font-size: 2.2rem; }
            .predict-btn.die-predict { width: 54px; height: 54px; padding: 6px; }
            .predict-btn.coin-predict { width: 70px; height: 70px; font-size: 1.1rem; }
            .die-dot { width: 7px; height: 7px; }
            .game-area { padding: 20px 14px; gap: 14px; }
            .die-result-face { width: 80px; height: 80px; padding: 10px; }
            .die-result-face .die-dot { width: 12px; height: 12px; }
            .coin-result { width: 80px; height: 80px; font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎯 The Reliability Game</h1>
        <p class="subtitle">Coin = Reliable • Die = Unreliable — You vs. Computer</p>
    </div>

    <div class="scoreboard">
        <div class="player-card player" id="playerCard">
            <div class="label">🧑 You (Player)</div>
            <div class="points" id="playerPoints">5</div>
            <div class="point-change" id="playerChange"></div>
        </div>
        <div class="player-card computer" id="computerCard">
            <div class="label">💻 Computer</div>
            <div class="points" id="computerPoints">5</div>
            <div class="point-change" id="computerChange"></div>
        </div>
    </div>

    <div class="round-indicator" id="roundIndicator">
        <div class="round-dot active" data-round="1"></div>
        <div class="round-dot" data-round="2"></div>
        <div class="round-dot" data-round="3"></div>
        <span class="round-label">Round <span id="roundNumber">1</span> of 3</span>
    </div>

    <div class="game-area" id="gameArea"></div>

    <div class="history" id="historyContainer">
        <h3>📋 Round History</h3>
        <div id="historyList">
            <p style="color:#b0bec5;font-size:0.85rem;text-align:center;padding:8px;">No rounds played yet.</p>
        </div>
    </div>
</div>

<div class="overlay hidden" id="endOverlay">
    <div class="modal" id="endModal"></div>
</div>

<script>
    (function() {
        const state = {
            playerPoints: 5,
            computerPoints: 5,
            currentRound: 1,
            maxRounds: 3,
            phase: 'choosing',
            chosenGame: null,
            prediction: null,
            outcome: null,
            pendingChanges: null,
            roundHistory: [],
            animatingReveal: false,
        };

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const gameArea = $('#gameArea');
        const playerPointsEl = $('#playerPoints');
        const computerPointsEl = $('#computerPoints');
        const playerCard = $('#playerCard');
        const computerCard = $('#computerCard');
        const playerChangeEl = $('#playerChange');
        const computerChangeEl = $('#computerChange');
        const roundNumberEl = $('#roundNumber');
        const roundDots = $$('.round-dot');
        const historyList = $('#historyList');
        const endOverlay = $('#endOverlay');
        const endModal = $('#endModal');

        const dieDotPatterns = {
            1: [5],
            2: [3,7],
            3: [3,5,7],
            4: [1,3,7,9],
            5: [1,3,5,7,9],
            6: [1,3,4,6,7,9],
        };

        function createDieFaceHTML(number) {
            const dots = dieDotPatterns[number] || [];
            let html = '';
            for (let pos=1; pos<=9; pos++) {
                const visible = dots.includes(pos);
                html += `<div class="die-dot${visible ? '' : ' hidden'}"></div>`;
            }
            return html;
        }

        function updateScoreDisplay(animatePlayer = null, animateComputer = null) {
            playerPointsEl.textContent = state.playerPoints;
            computerPointsEl.textContent = state.computerPoints;

            if (animatePlayer !== null && animatePlayer !== 0) {
                const val = animatePlayer > 0 ? '+' + animatePlayer : String(animatePlayer);
                playerChangeEl.textContent = val;
                playerChangeEl.className = 'point-change ' + (animatePlayer > 0 ? 'win' : 'lose') + ' show';
                playerCard.classList.add(animatePlayer > 0 ? 'pulse-win' : 'pulse-lose');
                setTimeout(() => {
                    playerChangeEl.className = 'point-change';
                    playerCard.classList.remove('pulse-win', 'pulse-lose');
                }, 1500);
            }
            if (animateComputer !== null && animateComputer !== 0) {
                const val = animateComputer > 0 ? '+' + animateComputer : String(animateComputer);
                computerChangeEl.textContent = val;
                computerChangeEl.className = 'point-change ' + (animateComputer > 0 ? 'win' : 'lose') + ' show';
                computerCard.classList.add(animateComputer > 0 ? 'pulse-win' : 'pulse-lose');
                setTimeout(() => {
                    computerChangeEl.className = 'point-change';
                    computerCard.classList.remove('pulse-win', 'pulse-lose');
                }, 1500);
            }
        }

        function updateRoundIndicator() {
            roundNumberEl.textContent = state.currentRound;
            roundDots.forEach(dot => {
                const r = parseInt(dot.dataset.round);
                dot.classList.remove('active', 'completed', 'current-win', 'current-loss');
                if (r < state.currentRound) dot.classList.add('completed');
                if (r === state.currentRound && state.phase !== 'complete') {
                    dot.classList.add('active');
                }
            });
        }

        function updateHistory() {
            if (state.roundHistory.length === 0) {
                historyList.innerHTML = '<p style="color:#b0bec5;font-size:0.85rem;text-align:center;padding:8px;">No rounds played yet.</p>';
                return;
            }
            historyList.innerHTML = state.roundHistory.map((h,i) => {
                const outcomeClass = h.playerChange > 0 ? 'win' : 'lose';
                const outcomeSymbol = h.playerChange > 0 ? '✅ Won' : '❌ Lost';
                const changeStr = h.playerChange > 0 ? '+' + h.playerChange : String(h.playerChange);
                const gameLabel = h.game === 'coin' ? '🪙 Coin' : '🎲 Die';
                const predStr = h.game === 'coin' ? (h.prediction === 'heads' ? 'Heads' : 'Tails') : 'Number ' + h.prediction;
                const outcomeStr = h.game === 'coin' ? (h.outcome === 'heads' ? 'Heads' : 'Tails') : 'Number ' + h.outcome;
                return `
                    <div class="history-item">
                        <span class="round-badge">Round ${i+1}</span>
                        <span>${gameLabel}</span>
                        <span>Predicted: <strong>${predStr}</strong></span>
                        <span>→ Rolled: <strong>${outcomeStr}</strong></span>
                        <span class="outcome-badge ${outcomeClass}">${outcomeSymbol} ${changeStr} pts</span>
                    </div>
                `;
            }).join('');
        }

        function renderChoosingPhase() {
            gameArea.innerHTML = `
                <h2>Pick your game for Round ${state.currentRound}</h2>
                <p class="hint">Choose wisely — each choice has different risks and rewards</p>
                <div class="choice-buttons">
                    <button class="choice-btn coin" id="btnChooseCoin">
                        <span class="icon">🪙</span>
                        <span class="name">Coin Toss</span>
                        <span class="stakes">
                            <span class="win-text">Win: +1 pt</span> &nbsp;|&nbsp;
                            <span class="lose-text">Lose: −1 pt</span><br>
                            <small>50% chance • Fair & Reliable</small>
                        </span>
                    </button>
                    <button class="choice-btn die" id="btnChooseDie">
                        <span class="icon">🎲</span>
                        <span class="name">Dice Roll</span>
                        <span class="stakes">
                            <span class="win-text">Win: +3 pts</span> &nbsp;|&nbsp;
                            <span class="lose-text">Lose: −3 pts</span><br>
                            <small>~17% chance • Risky & Unreliable</small>
                        </span>
                    </button>
                </div>
            `;
            $('#btnChooseCoin').addEventListener('click', () => chooseGame('coin'));
            $('#btnChooseDie').addEventListener('click', () => chooseGame('die'));
        }

        function renderPredictingPhase() {
            if (state.chosenGame === 'coin') {
                gameArea.innerHTML = `
                    <h2>🪙 Predict the Coin Toss</h2>
                    <p class="hint">Heads or Tails? (50/50 chance)</p>
                    <div class="prediction-buttons">
                        <button class="predict-btn coin-predict" id="btnPredictHeads">Heads</button>
                        <button class="predict-btn coin-predict" id="btnPredictTails">Tails</button>
                    </div>
                    <button class="action-btn secondary" id="btnBack">← Go Back</button>
                `;
                $('#btnPredictHeads').addEventListener('click', () => makePrediction('heads'));
                $('#btnPredictTails').addEventListener('click', () => makePrediction('tails'));
                $('#btnBack').addEventListener('click', () => { state.chosenGame = null; state.phase = 'choosing'; renderChoosingPhase(); });
            } else {
                gameArea.innerHTML = `
                    <h2>🎲 Predict the Dice Roll</h2>
                    <p class="hint">Pick a number from 1 to 6 (~17% chance each)</p>
                    <div class="prediction-buttons" id="diePredictButtons">
                        ${[1,2,3,4,5,6].map(n => `
                            <button class="predict-btn die-predict" data-prediction="${n}" id="btnPredictDie${n}">
                                ${createDieFaceHTML(n)}
                            </button>
                        `).join('')}
                    </div>
                    <button class="action-btn secondary" id="btnBack">← Go Back</button>
                `;
                [1,2,3,4,5,6].forEach(n => {
                    $('#btnPredictDie'+n).addEventListener('click', () => makePrediction(n));
                });
                $('#btnBack').addEventListener('click', () => { state.chosenGame = null; state.phase = 'choosing'; renderChoosingPhase(); });
            }
        }

        function renderRevealingPhase() {
            if (state.chosenGame === 'coin') {
                gameArea.innerHTML = `
                    <h2>🪙 Flipping the coin...</h2>
                    <div style="font-size:4rem;animation: resultBounce 0.4s ease-out infinite;">🪙</div>
                `;
                setTimeout(() => showFinalResult(), 1000);
            } else {
                gameArea.innerHTML = `
                    <h2>🎲 Rolling the die...</h2>
                    <div class="die-result-face" id="rollingDieFace">
                        ${createDieFaceHTML(Math.floor(Math.random()*6)+1)}
                    </div>
                `;
                let rollCount = 0;
                const maxRolls = 12;
                const rollInterval = setInterval(() => {
                    rollCount++;
                    const rf = $('#rollingDieFace');
                    if (rf && rollCount < maxRolls) {
                        rf.innerHTML = createDieFaceHTML(Math.floor(Math.random()*6)+1);
                    }
                    if (rollCount >= maxRolls) {
                        clearInterval(rollInterval);
                        setTimeout(() => showFinalResult(), 300);
                    }
                }, 80);
                gameArea._rollInterval = rollInterval;
            }
        }

        function showFinalResult() {
            if (gameArea._rollInterval) {
                clearInterval(gameArea._rollInterval);
                gameArea._rollInterval = null;
            }

            // Apply pending point changes now (after animation)
            const pending = state.pendingChanges;
            if (pending) {
                state.playerPoints += pending.playerChange;
                state.computerPoints += pending.computerChange;
                state.playerPoints = Math.max(0, state.playerPoints);
                state.computerPoints = Math.max(0, state.computerPoints);

                state.roundHistory.push({
                    game: pending.game,
                    prediction: pending.prediction,
                    outcome: pending.outcome,
                    isCorrect: pending.isCorrect,
                    playerChange: pending.playerChange,
                    computerChange: pending.computerChange,
                });

                updateScoreDisplay(pending.playerChange, pending.computerChange);
                updateHistory();
                updateRoundIndicatorDots(pending.isCorrect);

                state.pendingChanges = null;
            }

            // Release the animation lock so the next round can be started
            state.animatingReveal = false;

            const lastRound = state.roundHistory[state.roundHistory.length-1];
            const isCorrect = lastRound ? lastRound.isCorrect : false;
            const outcome = lastRound ? lastRound.outcome : null;
            const game = lastRound ? lastRound.game : null;
            const prediction = lastRound ? lastRound.prediction : null;

            let resultHTML = '';
            if (game === 'coin') {
                resultHTML = `
                    <div class="result-display">
                        <div class="coin-result">${outcome === 'heads' ? 'H' : 'T'}</div>
                        <div class="result-outcome ${isCorrect ? 'win' : 'lose'}">
                            ${isCorrect ? '✅ You Win!' : '❌ You Lose!'}
                        </div>
                        <div class="result-detail">
                            You predicted <strong>${prediction === 'heads' ? 'Heads' : 'Tails'}</strong> 
                            • Result: <strong>${outcome === 'heads' ? 'Heads' : 'Tails'}</strong>
                            <br>Point change: <strong>${isCorrect ? '+1 for you' : '−1 for you'}</strong>
                        </div>
                        <button class="action-btn primary" id="btnNextRound">
                            ${state.currentRound >= state.maxRounds ? '🏁 See Final Results' : '▶ Next Round'}
                        </button>
                    </div>
                `;
            } else if (game === 'die') {
                resultHTML = `
                    <div class="result-display">
                        <div class="die-result-face">
                            ${createDieFaceHTML(outcome)}
                        </div>
                        <div class="result-outcome ${isCorrect ? 'win' : 'lose'}">
                            ${isCorrect ? '✅ You Win!' : '❌ You Lose!'}
                        </div>
                        <div class="result-detail">
                            You predicted <strong>${prediction}</strong> 
                            • Result: <strong>${outcome}</strong>
                            <br>Point change: <strong>${isCorrect ? '+3 for you' : '−3 for you'}</strong>
                        </div>
                        <button class="action-btn primary" id="btnNextRound">
                            ${state.currentRound >= state.maxRounds ? '🏁 See Final Results' : '▶ Next Round'}
                        </button>
                    </div>
                `;
            }
            gameArea.innerHTML = resultHTML;
            $('#btnNextRound').addEventListener('click', advanceRound);
        }

        function updateRoundIndicatorDots(isCorrect) {
            roundDots.forEach(dot => {
                const r = parseInt(dot.dataset.round);
                if (r === state.currentRound) {
                    dot.classList.remove('active');
                    dot.classList.add(isCorrect ? 'current-win' : 'current-loss');
                }
            });
        }

        function chooseGame(gameType) {
            if (state.animatingReveal) return;
            state.chosenGame = gameType;
            state.phase = 'predicting';
            renderPredictingPhase();
        }

        function makePrediction(prediction) {
            if (state.animatingReveal) return;
            state.prediction = prediction;
            state.phase = 'revealing';
            state.animatingReveal = true;

            // Determine outcome
            if (state.chosenGame === 'coin') {
                state.outcome = Math.random() < 0.5 ? 'heads' : 'tails';
            } else {
                state.outcome = Math.floor(Math.random() * 6) + 1;
            }

            const isCorrect = state.chosenGame === 'coin' ?
                state.prediction === state.outcome :
                state.prediction === state.outcome;

            let playerChange = 0;
            let computerChange = 0;

            if (state.chosenGame === 'coin') {
                if (isCorrect) {
                    const transfer = Math.min(1, state.computerPoints);
                    playerChange = +transfer;
                    computerChange = -transfer;
                } else {
                    const transfer = Math.min(1, state.playerPoints);
                    playerChange = -transfer;
                    computerChange = +transfer;
                }
            } else {
                if (isCorrect) {
                    const transfer = Math.min(3, state.computerPoints);
                    playerChange = +transfer;
                    computerChange = -transfer;
                } else {
                    const transfer = Math.min(3, state.playerPoints);
                    playerChange = -transfer;
                    computerChange = +transfer;
                }
            }

            // Store pending changes – do NOT update actual points yet
            state.pendingChanges = {
                game: state.chosenGame,
                prediction: state.prediction,
                outcome: state.outcome,
                isCorrect,
                playerChange,
                computerChange
            };

            renderRevealingPhase();
        }

        function advanceRound() {
            if (state.animatingReveal) return;
            if (state.currentRound >= state.maxRounds) {
                endGame();
                return;
            }
            state.currentRound++;
            state.phase = 'choosing';
            state.chosenGame = null;
            state.prediction = null;
            state.outcome = null;
            state.pendingChanges = null;
            updateRoundIndicator();
            renderChoosingPhase();
        }

        function endGame() {
            state.phase = 'complete';
            updateRoundIndicator();
            renderEndModal();
            endOverlay.classList.remove('hidden');
        }

        function renderEndModal() {
            const coinRounds = state.roundHistory.filter(h => h.game === 'coin');
            const dieRounds = state.roundHistory.filter(h => h.game === 'die');
            const coinNet = coinRounds.reduce((sum, h) => sum + h.playerChange, 0);
            const dieNet = dieRounds.reduce((sum, h) => sum + h.playerChange, 0);

            const playerFinal = state.playerPoints;
            const computerFinal = state.computerPoints;
            const playerWon = playerFinal > computerFinal;
            const tied = playerFinal === computerFinal;

            let resultEmoji = playerWon ? '🎉' : tied ? '🤝' : '💻';
            let resultText = playerWon ? 'You beat the computer!' : tied ? "It's a tie!" : 'The computer won.';

            endModal.innerHTML = `
                <h2>${resultEmoji} Game Over!</h2>
                <p style="font-size:1.1rem;font-weight:600;color:#2d3748;">${resultText}</p>
                <div class="final-scores">
                    <div class="final-score-card player-final">
                        🧑 You<br><span style="font-size:2rem;">${playerFinal}</span> pts
                    </div>
                    <div class="final-score-card computer-final">
                        💻 Computer<br><span style="font-size:2rem;">${computerFinal}</span> pts
                    </div>
                </div>
                <div class="ev-comparison">
                    <div class="ev-card coin-ev">
                        🪙 Coin Toss<br>
                        <small>Your net: <strong>${coinNet >= 0 ? '+' : ''}${coinNet}</strong> pts<br>
                        Expected Value: <strong>0</strong> (Fair & Reliable)</small>
                    </div>
                    <div class="ev-card die-ev">
                        🎲 Dice Roll<br>
                        <small>Your net: <strong>${dieNet >= 0 ? '+' : ''}${dieNet}</strong> pts<br>
                        Expected Value: <strong>−2.0</strong> (Unreliable)</small>
                    </div>
                </div>
                <div class="lesson-box">
                    <strong>💡 The Lesson: Reliability Matters</strong><br><br>
                    The <strong>coin toss</strong> is <em>reliable</em> — a fair 50/50 chance with symmetric stakes (+1 / −1). 
                    Its expected value is <strong>zero</strong>: over time, you break even.<br><br>
                    The <strong>dice roll</strong> is <em>unreliable</em> — only a ~17% chance to win, and even though 
                    the stakes are symmetric (+3 / −3), the low success probability creates a negative expected 
                    value of <strong>−2.0</strong> per roll.<br><br>
                    In life, <strong>reliable systems preserve value</strong>, while unreliable ones — with their 
                    tempting upsides and hidden downsides — <strong>destroy it</strong>. Choose reliability.
                </div>
                <div class="btn-row">
                    <button class="action-btn primary" id="btnPlayAgain">🔄 Play Again</button>
                </div>
            `;
            $('#btnPlayAgain').addEventListener('click', resetGame);
        }

        function resetGame() {
            if (gameArea._rollInterval) {
                clearInterval(gameArea._rollInterval);
                gameArea._rollInterval = null;
            }
            state.playerPoints = 5;
            state.computerPoints = 5;
            state.currentRound = 1;
            state.phase = 'choosing';
            state.chosenGame = null;
            state.prediction = null;
            state.outcome = null;
            state.pendingChanges = null;
            state.roundHistory = [];
            state.animatingReveal = false;
            updateScoreDisplay();
            updateRoundIndicator();
            updateHistory();
            roundDots.forEach(dot => {
                dot.classList.remove('completed', 'current-win', 'current-loss');
            });
            roundDots[0].classList.add('active');
            renderChoosingPhase();
            endOverlay.classList.add('hidden');
        }

        endOverlay.addEventListener('click', function(e) {
            if (e.target === endOverlay) { /* do nothing */ }
        });

        function init() {
            updateScoreDisplay();
            updateRoundIndicator();
            updateHistory();
            renderChoosingPhase();
        }

        init();
        console.log('🎯 The Reliability Game (Player vs Computer)');
        console.log('   Coin EV = 0 (fair & reliable)');
        console.log('   Die EV = (1/6)×3 + (5/6)×(−3) = −2.0 (unreliable!)');
    })();
</script>
</body>
</html>
